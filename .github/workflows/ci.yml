# CI: install, static checks (lint + typecheck), tests, build, image build.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      # Tests boot their own embedded Postgres clusters — no service needed.
      # `pnpm test` is ALSO where migrations run on CI: `backend/test/migrate.test.ts`
      # and `backend/test/migrate-cli.test.ts` exercise `runMigrations` and the
      # `pnpm migrate` CLI's `main()` against a real embedded engine (the same
      # `db/migrations/*.sql` files prod applies). No standalone `migrate` step
      # or postgres service is added — it would duplicate the harness without
      # adding coverage. (The compose migrate-then-serve flow itself is verified
      # locally via `docker compose up --build`; CI's `image` job below builds
      # that same image.)
      - run: pnpm test
      - run: pnpm build

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
