# CI: install, typecheck, tests against a real Postgres, docker builds.
# NOTE (overnight build): written blind — no GitHub remote existed tonight.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      # Tests boot their own embedded Postgres clusters — no service needed.
      - run: pnpm test
      - run: pnpm build

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pigeon
          POSTGRES_PASSWORD: pigeon
          POSTGRES_DB: pigeon
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pigeon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://pigeon:pigeon@localhost:5432/pigeon
      VAULT_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SESSION_SECRET: ci-only-session-secret-ci-only-session-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm migrate
      # Idempotency: a second run must apply nothing and exit 0.
      - run: pnpm migrate

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
