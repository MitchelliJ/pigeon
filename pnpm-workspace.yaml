packages:
  - "frontend"
  - "backend"
  - "shared"

# --- Supply-chain safety -----------------------------------------------------
# Never install a package version that was published less than 24h ago.
# Newly-published versions are where compromised/malicious releases surface;
# the cooldown gives the community time to flag and yank them first.
# Value is in MINUTES (24 * 60 = 1440). Requires pnpm >= 10.16.
minimumReleaseAge: 1440
# Add `name` or `name@version` entries here to bypass the cooldown for a
# genuine critical hotfix, e.g.:
# minimumReleaseAgeExclude:
#   - some-package@1.2.3

# --- Build script approval ---------------------------------------------------
# pnpm 10 blocks dependency postinstall scripts by default. `embedded-postgres`
# ships platform-specific binary packages whose build script generates the
# symlinks Postgres needs at runtime — without it the test harness cannot boot.
# Approve the platform packages we actually run on: windows-x64 (dev), linux-x64
# (CI). Other platform deps are optional and won't install here.
onlyBuiltDependencies:
  - "@embedded-postgres/windows-x64"
  - "@embedded-postgres/linux-x64"
