# Pigeon single-box stack: Postgres + backend API + worker.
# Local:      cp .env.example .env  &&  docker compose up --build
# Production: same file on the Hetzner host; see deploy/hetzner.md.
#
# NOTE: written before a live Docker daemon was available — validate with
# `docker compose config` before first use. The `migrate` step is re-added
# in feature 1 (infrastructure baseline) once migrations exist.

name: pigeon

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pigeon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pigeon}
      POSTGRES_DB: pigeon
      # Real mail requires UTF8 — never the OS default locale.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pigeon -d pigeon"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["pnpm", "start"]
    restart: unless-stopped
    ports:
      - "8788:8788"
    environment: &appenv
      NODE_ENV: production
      DATABASE_URL: postgres://pigeon:${POSTGRES_PASSWORD:-pigeon}@db:5432/pigeon
      HOST: 0.0.0.0
      PORT: "8788"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["pnpm", "start:worker"]
    restart: unless-stopped
    environment: *appenv
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
