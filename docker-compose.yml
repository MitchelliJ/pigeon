# Pigeon single-box stack: Postgres + backend API + worker.
# Local:      cp .env.example .env  &&  docker compose up --build
# Production: same file on the Hetzner host; see deploy/hetzner.md.
#
# Migrations run once as a one-shot `migrate` service before `server` and
# `worker` start (both block on `service_completed_successfully`).

name: pigeon

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pigeon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pigeon}
      POSTGRES_DB: pigeon
      # Real mail requires UTF8 — never the OS default locale.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pigeon -d pigeon"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["pnpm", "migrate"]
    restart: "no"
    environment: &appenv
      NODE_ENV: production
      DATABASE_URL: postgres://pigeon:${POSTGRES_PASSWORD:-pigeon}@db:5432/pigeon
      HOST: 0.0.0.0
      PORT: "8788"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["pnpm", "start"]
    restart: unless-stopped
    ports:
      - "8788:8788"
    environment: *appenv
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["pnpm", "start:worker"]
    restart: unless-stopped
    environment: *appenv
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
